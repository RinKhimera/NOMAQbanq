version: 2
updates:
  # Dépendances npm — écosystème "bun" pour que Dependabot régénère bun.lock
  # (avec "npm" il ne touche que package.json → le CI échoue sur --frozen-lockfile)
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Montreal"
    open-pull-requests-limit: 10
    # Grouper les mises à jour pour éviter trop de PRs.
    # Ordre = priorité : une dépendance va dans le PREMIER groupe qui la capture.
    groups:
      # Framework critique en premier : isolé, toutes versions, pour review attentive
      nextjs:
        patterns:
          - "next"
          - "react"
          - "react-dom"
      # Tout le reste en minor + patch : 1 seule PR (idéale pour l'auto-merge)
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      # Tout le reste en major : 1 seule PR groupée (breaking, à reviewer ensemble)
      major:
        patterns:
          - "*"
        update-types:
          - "major"
    ignore:
      # Les types doivent suivre le runtime Node (Vercel/CI = Node 24 LTS)
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # Retirer quand eslint-config-next supportera ESLint 10
      # (eslint-plugin-react crashe : context.getFilename() supprimé)
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      # Retirer quand Vitest embarquera Vite 8 (v6 importe vite/internal, absent de Vite 7)
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    # Toutes les actions dans une seule PR groupée au lieu d'une PR par action
    groups:
      actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
